server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    # The frontend Vite build points to /api by default when using this nginx.
    # However since VITE_API_URL is an absolute URL, this proxy block is a
    # fallback safety net for same-origin setups.
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health probe for nginx itself
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Gzip for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
