services:

  # ──────────────────────────────────────────────────────────────
  # BACKEND  →  VPS:4100 → container:3000
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: unless-stopped
    ports:
      - "4100:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - crm-net

  # ──────────────────────────────────────────────────────────────
  # FRONTEND  →  VPS:3100 → nginx:80
  # VITE_API_URL é embutida no JS durante o build.
  # Deve apontar para o IP/domínio público do backend na VPS.
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: crm-frontend
    restart: unless-stopped
    ports:
      - "3100:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm-net

networks:
  crm-net:
    driver: bridge
